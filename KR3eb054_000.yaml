front:
  text: 自序嘗讀仲景書止言舌白苔滑並無黃黑刺裂至金鏡錄始集三十六圖逮後觀舌心法廣至一百三十有七何後世證變之多若此寧知傷寒自表傳裡舌苔必由白滑而變他色不似伏邪瘟疫等熱毒自內達外之一病便見黃黑諸苔也觀仲景論中一見舌白苔滑即言難治安有失治而致變者乎所以仲景止言白苔已見一斑不煩瑣屑後人無先聖治未病之能勢不得不反復辨論以啟蒙昧蓋邪氣入里其虛實寒熱之機必現於舌非若脈法之隱而不顯也況陰盛格陽與邪熱鬱伏多有假證假脈惟驗舌上苔色之滑燥厚薄昭若冰鑑無所遁形由是取觀舌心法正其錯誤削其繁蕪汰其無預於傷寒者而參入家大人治案所紀及己所親歷共得一百二十圖命曰傷寒舌鑑授之剞劂以公同志臨證之一助云康熙戊申年秋月誕先張登書於雋永堂
