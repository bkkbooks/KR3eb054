body:
  text: 白苔舌總論傷寒邪在皮毛初則舌有白沫次則白涎白滑再次白屑白疱有舌中舌尖舌根之不同是寒邪入經之微甚也舌乃心之苗心屬南方火當赤色今反見白色者是火不能制金也初則寒鬱皮膚毛竅不得疏通熱氣不得外泄故惡寒發熱在太陽經則頭痛身熱項背強腰脊疼等症傳至陽明經則有白屑滿舌雖症有煩躁如脈浮緊者猶當汗之在少陽經者則白苔白滑用小柴胡湯和之胃虛者理中湯溫之如白色少變黃者大柴胡大小承氣分輕重下之白舌亦有死症不可忽視也寒邪初入太陽頭疼身熱惡寒舌色微白有津香蘇散羌活湯之類發散之此太陽里證舌也二三日未曾汗故邪入丹田漸深急宜汗之或太陽與少陽合病有此舌者柴胡桂枝湯主之病三四日其邪只在太陽故苔純白而厚卻不幹燥其證頭疼發熱脈浮而緊解表自愈病四五日未經發汗邪熱漸深少有微渴過飲生冷停積胸中營熱胃冷故令發熱煩躁四肢逆冷而苔白乾厚滿口白屑宜四逆散加乾薑此太陽經初傳陽明府病舌也若微黃而潤宜再汗待苔燥里證具則下之若煩躁嘔吐大柴胡湯加減亦有下淡黃水沫無稀糞者大承氣湯下之舌中見白苔外有微黃者必作泄宜用解毒湯惡寒者五苓散此陽明府兼太陽舌其苔邊白中心乾黑者因汗不徹傳至陽明所致必微汗出不惡寒脈沉者可下之如二三日未曾汗有此舌必死此陽明府兼少陽舌也三四日自利脈長者生弦數者死如有宿食用大承氣下之十可全五白苔中生滿乾黑芒刺乃少陽之裡證也其證不惡寒反惡熱者大柴胡加芒硝急下之然亦危證也白苔中黑為表那入里之候大熱譫語承氣等下之倘食復而發熱或利不止者難治白苔見於一邊無論左右皆屬半表半裡宜小柴胡湯左加葛根右加茯苓有咳嗽引脅下痛而見此舌苔者小青龍湯夏月多汗自利人參白虎湯或左或右半邊白苔半邊或黑或老黃者寒邪結在臟也黃連湯加附子結在咽者不能語言宜生脈散合四逆湯可救十中一二白苔中有黑小斑點亂生者乃水來剋火如無惡候以涼膈散承氣湯下之十中可救一二傷寒胸中有寒丹田有熱所以舌上白苔因過汗傷營舌上無津所以燥裂內無實熱故不黃黑宜小柴胡加芒硝微利之舌苔白而根黑火被水克之象雖下亦難見功也邪雖入里而尖白未黃不可用承氣宜大柴胡湯加減下後無他證安臥神清可生倘再有變證多凶此陽明裡證舌也黃乃土之色因邪熱上攻致令舌有雙黃如脈長惡熱轉矢氣煩躁者大柴胡調胃承氣下之白苔中見黑色兩條乃太陽少陽之邪入於胃因土氣衰絕故手足厥冷胸中結痛也理中湯瀉心湯選用如邪結在舌根咽嗌而不能言者死證也此夾冷食舌也七八日後見此舌而有津者可治理中四逆選用無津者不治如干厚見里證則下之得湯次日灰色去者安舌尖白而根灰黑少陽邪熱傳腑熱極而傷冷飲也如水停津液固結而渴者五苓散自汗而渴者白虎湯下利而渴者解毒湯如黑根多白尖少中不甚紅者難治滿舌白滑而尖卻鮮紅者乃熱邪內盛而復感客寒入少陽經也小柴胡湯加減此太陽初傳經之舌也無汗者發汗有汗者解肌亦有少陽經者小柴胡湯加減少陽證罷初見陽明裡證故苔變黃色兼矢氣者大柴胡湯下之舌尖苔白邪在半表半裡也其證寒熱耳聾口苦脅痛脈弦小柴胡湯和解之此太陽濕熱並於陽明也如根黃色潤目黃小便黃者茵陳蒿湯加減舌根尖俱黑而中白乃金水太過火土氣絕於內雖無凶證亦必死也白苔老極如煮熟相似者心氣絕而肺色乘於上也始因食瓜果冰水等物陽氣不得發越所致為必死候用枳實理中間有生者年老胃弱雖有風寒不能變熱或多服湯藥傷其胃氣所以淡白透明似苔非苔也宜補中益氣加減治之此舌乃瘟疫初犯募原也達原飲見三陽表證隨經加柴胡葛根羌活見里證加大黃黃苔舌總論黃苔者里證也傷寒初病無此舌傳至少陽經亦無此舌直至陽明府實胃中火盛火乘土位故有此苔當分輕重瀉之初則微黃次則深黃有滑甚則干黃焦黃也其證有大熱大渴便秘譫語痞結自利或因失汗發黃或蓄血如狂皆濕熱太盛小便不利所致若目白如金身黃如橘宜茵陳蒿湯五苓散梔子柏皮湯等如蓄血在上焦犀角地黃湯中焦桃仁承氣湯下焦代抵當湯凡血證見血則愈切不可與冷水飲之必死大抵舌黃證雖重若脈長者中土有氣也下之則安如脈弦下利舌苔黃中有黑色者皆危證也舌見黃苔胃熱之極土色見於舌端也急宜調胃承氣下之遲則恐黃老變黑為惡候舌微黃而不甚燥者表邪失汗而初傳裡也用大柴胡湯若身目俱黃者茵陳蒿湯舌見干黃裡熱已極急下勿緩下後脈靜身涼者生反大熱而喘脈躁者死舌黃而有黑滑者陽明裡證具也雖不幹燥亦當下之下後身涼脈靜者生大熱脈躁者死黃苔中亂生黑斑者其證必大渴譫語身無斑者大承氣下之如脈澀譫語循衣摸床身黃斑黑者俱不治下出稀黑糞者死黃苔從中至尖通黑者乃火土燥而熱毒最深也兩感傷寒必死惡寒甚者亦死如不惡寒口燥咽乾而下利臭水者可用調胃承氣湯下之十中可救四五口乾齒燥形脫者不治舌黃乾澀而有隔瓣者乃邪熱入胃毒結已深煩躁而渴者大承氣湯發黃者茵陳蒿湯少腹痛者有瘀血也抵當湯結胸大陷胸湯舌尖苔黃熱邪初傳胃腑也當用調胃承氣湯如脈浮惡寒表證未盡大柴胡兩解之舌根灰色而尖黃雖比黑根少輕如再過一二日亦黑也難治無煩躁直視脈沉而有力者大柴胡加減治之根紅而尖黃者乃濕熱乘火位也瘟熱初病多有此舌涼膈解毒等藥消息治之舌黑根多而黃尖少者雖無惡證惡脈誠恐暴變一時以胃氣竭絕故耳舌苔老黃極而中有黑刺者皆由失汗所致邪毒內陷已深急用調胃承氣下之十中可保一二舌黃而脹大者乃陽明胃經濕熱也證必身黃便秘煩躁茵陳蒿湯如大便自利而發黃者五苓散加茵陳梔子黃連等治之舌根白尖黃其色倒見必是少陽經傳陽明府病若陽明證多者大柴胡湯少陽證多者小柴胡湯如譫語煩躁者調胃承氣湯舌尖白根黃乃表邪少而里邪多也天水散涼膈散合用如陽明無汗小便不利心中懊憹者必發黃茵陳蒿湯舌乃火位今見根黃尖灰是土來侮火也不吐不利心煩而渴者乃胃中有鬱熱也調胃承氣加黃連舌見根黃尖白而短硬不燥不滑但不能伸出證多譫妄煩亂此痰挾宿食佔據中宮也大承氣加薑半主之黑苔舌總論傷寒五七日舌見黑苔最為危候表證皆無此舌如兩感一二日間見之必死若白苔上漸漸中心黑者是傷寒邪熱傳裡之候紅舌上漸漸黑者乃瘟疫傳變壞證將至也蓋舌色本赤今見黑者乃水來剋火水極似火火過炭黑之理然有純黑有黑暈有刺有隔瓣有瓣底紅瓣底黑者大抵尖黑猶輕根黑最重如全黑者總使神丹亦難救療也遍舌黑苔是火極似水臟氣已絕脈必代結一二日中必死切勿用藥黃苔久而變黑實熱亢極之候又未經服藥肆意飲食而見脈伏目閉口開獨語譫妄醫遇此證必掘開舌苔視瓣底紅者可用大承氣下之凡見瓣底黑者不可用藥雖無惡候脈亦暴絕必死不治滿舌黑苔乾燥而生大刺揉之觸手而響掘開刺底紅色者心神尚在雖火過極下之可生有肥盛多濕熱人感冒發熱痞脹悶亂一見此舌急用大陷胸丸攻下後與小陷胸湯調理刺底黑者言刮去芒刺底下肉色俱黑也凡見此舌不必辨其何經何脈雖無惡候必死勿治舌黑爛而頻欲齧必爛至根而死雖無惡候怪脈切勿用藥舌見中黑邊白而滑表裡俱虛寒也脈必微弱證必畏寒附子理中湯溫之夏月過食生冷而見此舌則宜大順冷香選用舌黑有津證見譫語者必表證時不曾服藥不戒飲食冷物結滯於胃也虛人黃龍湯或枳實理中加大黃壯實者用備急丸熱下之夏月中暍多有此舌以人參白虎湯主之兩感一二日間便見中黑邊白厚苔者雖用大羌活湯恐無濟矣舌邊圍黑中有紅暈者乃邪熱入於心胞之候故有此色宜涼膈合大承氣下之舌苔中心黑厚而干為熱盛津枯之候急宜生脈散合黃連解毒湯以解之舌黑無苔而燥津液受傷而虛火用事也急宜生脈散合附子理中湯主之傷寒八九日過汗津枯血燥舌無苔而黑瘦大便五六日不行腹不硬滿神昏不得臥或時呢喃嘆息者炙甘草湯舌至乾黑而短厥陰極熱已深或食填中脘䐜脹所致急用大劑大承氣下之可救十中一二服後糞黃熱退則生糞黑熱不止者死灰色舌總論灰色舌有陰陽之異若直中陰經則即時舌便灰黑而無積苔若熱傳三陰必四五日表證罷而苔變灰色也有在根在尖在中者有渾舌俱灰黑者大抵傳經熱證則有灰黑乾薹皆當攻下泄熱若直中三陰之灰黑無苔者即當溫經散寒又有蓄血證其人如狂或瞑目譫語亦有不狂不語不知人事而面黑舌灰者當分輕重以攻其血切勿誤與冷水引領敗血入心而致不救也舌灰色無苔者直中三陰而夾冷食也脈必沉細而遲不渴不煩者附子理中四逆湯救之次日舌變灰中有微黃色者生如漸漸灰縮乾黑者死灰色現於中央而消渴氣上衝心飢不欲食食即吐蛔者此熱傳厥陰之候烏梅丸主之土邪勝水而舌見灰黑紋裂涼膈調胃皆可下之十中可救二三下後渴不止熱不退者不治舌根灰色而中紅尖黃乃腸胃燥熱之證若大渴譫語五六日不大便轉矢氣者下之如溫病熱病惡寒脈浮者涼膈雙解選用此瘟病熱毒傳遍三陰也熱毒傳內一次舌即灰暈一層毒盛故有重暈最危之證急宜涼膈雙解解毒承氣下之一暈尚輕二暈為重三暈必死亦有橫紋二三層者與此重暈不殊灰黑舌中又有干刺而見咽乾口燥喘滿乃邪熱結於少陰當下之然必待其轉矢氣者方可下若下之早令人小便難已經汗解而見舌尖灰黑有宿食未消或又傷飲食邪熱復盛之故調胃承氣湯下之舌尖灰黑有刺而干是得病後猶加飲食之故雖證見耳聾脅痛發熱口苦不得用小柴胡必大柴胡或調胃承氣加消導藥方可取效淡淡灰色中間有滑苔四五點如墨汁此熱邪傳裡而中有宿食未化也大柴胡湯舌灰色而根黃乃熱傳厥陰而胃中復有停滯也傷寒六七日不利便發熱而利汗出不止者死正氣脫也舌邊灰黑而中淡紫時時自齧舌尖為爽乃少陰厥氣逆上非藥可治紅色舌總論夫紅舌者伏熱內蓄於心胃自里而達於表也仲景云冬傷於寒至春變為溫病至夏變為熱病故舌紅而赤又有瘟疫疫癘一方之內老幼之病皆同者舌亦正赤而加積苔也若更多食則助熱內蒸故舌紅面赤甚者面目俱赤而舌瘡也然病有輕重舌有微甚且見於舌之根尖中下左右瘡蝕脹爛癟細長短種種異形皆瘟毒火熱蘊化之所為也其所治亦不同當解者內解其毒當砭者砭去其血若論湯液無過大小承氣黃連解毒三黃石膏等此類而推可也舌見純紅色乃瘟疫之邪熱初蓄於內也宜敗毒散加減或升麻葛根湯等治之舌紅中見淡黑色而有滑者乃太陽瘟疫也如惡寒有表證雙解散合解毒湯微微汗之汗罷急下如結胸煩躁直視者不治舌見紅色中有黑形如小舌乃瘟毒內結於胃火極反兼水化也宜涼膈散若黑而乾硬以指甲刮之有聲者急用調胃承氣湯下之見小黑斑星於紅舌上者乃瘟熱乘虛入於陽明胃熱則發斑也或身上亦兼有紅赤斑者宜黑參升麻湯化斑湯等治之舌本紅而尖黑者足少陰瘟熱乘於手少陰也竹葉石膏湯舌紅甚而又有紋裂者陽明熱毒熏蒸膈上故現人字紋也宜服涼膈散如渴甚轉矢氣者大承氣下之相火來乘君位致令舌紅燥而紋裂作痛宜黃連解毒湯加麥門冬寒潤之舌見淡紅色又有大紅星點如瘡瘰者濕熱傷於脾土罨而欲發黃之候宜茵陳蒿湯五苓散選用舌紅更有紅點坑爛如蟲蝕之狀乃水火不能既濟熱毒熾盛也不拘日數宜小承氣湯下之不退再以大承氣下之瘟疫多有此舌其證不惡寒便作渴煩躁或咳痰者宜解毒湯加黑參薄荷並益元散治之尺脈無者必死戰慄者亦死熱入陽明胃腑故舌根微黃若頭汗身涼小便難者茵陳蒿湯加梔子香豉病五七日舌中有黃苔是陽明證如脈沉實譫語雖苔滑宜大柴胡湯若干燥者此內邪熱盛急用大承氣下之舌長大脹出口外是熱毒乘心內服瀉心湯外砭去惡血再用片腦人中黃摻舌上即愈舌頻出口為弄舌餂至鼻尖上下或口角左右者此為惡候可用解毒湯加生地黃效則生不效則死舌痿軟而不能動者乃是心臟受傷當參脈證施治然亦十難救一也舌根強硬失音或邪結咽嗌以致不語者死證也如脈有神而外證輕者可用清心降火去風痰藥多有得生者舌上出血如濺者乃心臟邪熱壅盛所致宜犀角地黃湯加大黃黃連輩治之瘟熱病而舌見兩路灰色是病後復傷飲食所致令人身熱譫語循衣撮空如脈滑者一下便安如脈澀下出黑糞者死紅尖是本色白苔為表邪如惡寒身熱頭痛宜汗之不惡寒身熱煩渴者此太陽里證也五苓散兩解之舌戰者顫掉不安蠕蠕瞤動也此證因汗多亡陽或漏風所致十全大補大建中湯選用舌色乾紅而長細者乃少陰之氣絕於內而不上通於舌也縱無他證脈再衰絕朝夕恐難保矣口瘡舌短有疱聲啞咽乾煩躁者乃瘟疫強汗或傷寒未汗而變此證宜黃連犀角湯三黃石膏湯選用瘟病不知調治或不禁飲食或不服湯藥而致舌心乾黑急下一二次少解再下以平為期汗後食復而見紅尖紫刺證甚危急枳實梔子豉湯加大黃下之仍刮去芒刺不復生則安再生則危瘟疫二三日舌根灰黑急用涼膈雙解微下之至四五日後火極似水漸變深黑下無濟矣若邪結於咽目瞑脈絕油汗者一二日內死汗下太過津液耗竭而舌色鮮紅柔嫩如新生望之似潤而實燥涸者生脈散合人參三白湯治之然多不應也紫色舌總論紫舌苔者酒後傷寒也或大醉露臥當風或已病而仍飲酒或感冒不服藥而用蔥姜熱酒發汗汗雖出而酒熱留於心胞沖行經絡故舌見紫色而又有微白苔也苔結舌之根尖長短厚薄涎滑乾焦種種不同當參其源而治之傷寒以蔥酒發汗酒毒入心或酒後傷寒皆有此舌宜升麻葛根湯加石膏滑石若心煩懊憹不安梔子豉湯不然必發斑也舌渾紫而又滿舌紅斑或渾身更有赤斑者宜化斑湯解毒湯俱加葛根黃連青黛有下證者涼膈散舌紫而中見白苔者酒後感寒或誤飲冷酒所致亦令人頭痛惡寒身熱隨證解表可也舌淡紫帶青而潤中絆青黑筋者乃直中陰經必身涼四肢厥冷脈沉面黑四逆理中等治之舌邊紫而中心赤腫足陽明受邪或已下便食酒肉邪熱復聚所致若赤腫津潤大柴胡微利之若煩躁厥逆脈伏先用枳實理中次用小承氣嗜酒之人傷於寒至四五日舌紫上積干黃苔者急用大承氣下之如表證未盡用大柴胡湯舌紫短而團圞者食滯中宮而熱傳厥陰也急用大承氣湯下之下後熱退脈靜舌柔和者生否則死舌淡青紫而中有黃濕苔此食傷太陰也脈必沉細心下臍旁按之硬痛或矢氣者小承氣加生附子或黃龍湯主之感寒之後不戒酒食而見咳嗽生痰煩躁不寧舌色淡紫尖生蓓蕾乃酒濕傷肺味濃傷胃所致也宜小柴胡湯加減治之舌全紫如煮熟者乃熱邪傳入厥陰至篤之兆當歸四逆湯舌色青紫無苔且滑潤瘦小為直中腎肝陰證吳茱萸湯四逆湯急溫之舌淡紫而中心帶灰或青黑不燥不濕者為邪傷血分雖有下證只宜犀角地黃湯加酒大黃微利之黴醬色苔舌總論黴醬色苔者乃夾食傷寒一二日間即有此舌為寒傷太陰食停胃腑之證輕者苔色亦薄雖腹痛不下利桂枝湯加橘半枳樸痛甚加大黃冷食不消加乾薑厚朴其苔色厚而腹痛甚不止者必危舌見醬色乃黃兼黑色為土邪傳水證必唇口乾燥大渴雖用下奪鮮有得愈者舌見黴色乃飲食填塞於胃復為寒邪郁遏內熱不得外泄濕氣熏蒸罨而變此色也其脈多沉緊其人必煩躁腹痛五七日下之不通者必死太陰少陰氣絕也傷寒不戒葷膩致苔如醬餅浮於舌中乃食滯中宮之象如脈有胃氣不結代嘴不尖齒不燥不下利者可用枳實理中湯加薑汁炒川連若舌苔揩去復長仍前者必難救也舌黴色中有黃苔乃濕熱之物鬱滯中宮也二陳加枳實黃連若苔干黃更加酒大黃下之藍色苔舌總論藍色苔者乃肝木之色發見於外也傷寒病久已經汗下胃氣已傷致心火無氣胃土無依肺無所生木無所畏故乘膈上而見純藍色是金木相併火土氣絕之候是以必死如微藍或稍見藍紋猶可用溫胃健脾調肝益肺藥治之如純藍色者是肝木獨盛無畏雖無他證必死舌見純藍色中土陽氣衰微百不一生之候切勿用藥舌見藍紋乃胃土氣衰木氣相乘之候小柴胡去黃芩加炮姜若因寒物結滯急宜附子理中大建中湯妊娠傷寒舌總論妊娠傷寒邪入經絡輕則母病重則子傷枝傷果必墜理所必然故凡治此當先固其胎氣胎安則子母俱安面以候母舌以候子色澤則安色敗則斃面赤舌青者子死母活面舌俱青沫出者母子俱死亦有面舌俱白母子皆死者蓋謂色不澤也孕婦初傷於寒而見面赤舌上白滑即當微汗以解其表如面舌俱白因發熱多飲冷水陽極變陰所致當用溫中之藥若見厥冷煩躁誤與涼劑則厥逆吐利而死妊娠面赤舌黃五六日裡證見當微利之庶免熱邪傷胎之患若面舌俱黃此失於發汗濕熱入里所致當用清熱利水藥妊娠面舌俱黑水火相刑不必問其月數子母俱死面赤舌微黑者還當保胎如見灰黑乃邪入子宮其胎必不能固若面赤者根本未傷當急下以救其母妊娠傷寒溫熱而見面舌俱赤宜隨證汗下子母無虞傷寒面色皎白而舌赤者母氣素虛當用薑桂等藥桂不墜胎龐安常所言也若面黑舌赤亦非吉兆若在臨月則子得生而母當殞妊娠傷寒而見面赤舌紫乃酒毒內傳所致如淡紫戴青為陰證夾食即用枳實理中四逆輩恐難為力也若面赤舌青母雖無妨子殞腹內急宜平胃散加芒硝下之妊娠面黑而舌乾卷短或黃黑刺裂乃里證至急不下則熱邪傷胎下之危在頃刻如無直視循衣撮空等證十中可救一二
